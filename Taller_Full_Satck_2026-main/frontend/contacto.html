<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tecnohogar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light text-dark">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-info fs-3" href="index.html"><i class="bi bi-cpu-fill"></i> Tecnohogar</a>
            <div class="navbar-nav ms-auto fs-5">
                <a class="nav-link" href="index.html">Inicio</a>
                <a class="nav-link" href="productos.html">Productos</a>
                <a class="nav-link" href="ayuda.html">Ayuda</a>
                <a class="nav-link active" href="contacto.html">Contacto</a>
                <a class="nav-link text-warning fw-bold" href="admin-productos.html"><i class="bi bi-gear-fill"></i> Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 bg-white">
            <div class="text-center mb-4">
                <div class="display-4 text-primary mb-2"><i class="bi bi-envelope-paper-heart"></i></div>
                <h1 class="fw-bold text-secondary">¿Tienes dudas o necesitas asesoría?</h1>
                <p class="text-muted">Escríbenos y uno de nuestros asesores técnicos te responderá lo antes posible.</p>
            </div>
            <hr class="mb-4 border-primary">

            <form id="formContacto">
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-bold text-secondary"><i class="bi bi-person-fill"></i> Nombre Completo</label>
                    <input type="text" class="form-control form-control-lg rounded-3" id="nombre" placeholder="Ej: Rafael Forero" required>
                </div>
                <div class="mb-3">
                    <label for="correo" class="form-label fw-bold text-secondary"><i class="bi bi-envelope-at-fill"></i> Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg rounded-3" id="correo" placeholder="nombre@correo.com" required>
                </div>
                <div class="mb-3">
                    <label for="mensaje" class="form-label fw-bold text-secondary"><i class="bi bi-chat-left-text-fill"></i> Mensaje o Consulta</label>
                    <textarea class="form-control rounded-3" id="mensaje" rows="4" placeholder="Cuéntanos qué componentes estás buscando..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm rounded-3 mt-2"><i class="bi bi-send-fill"></i> Enviar Mensaje</button>
            </form>
        </div>
    </div>

    <footer class="text-center mt-5 p-4 bg-dark text-white-50">
        <div class="container">
            <p class="mb-0 small">&copy; 2026 - Proyecto Fase Electiva SENA - Desarrollado por Rafael Forero</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
